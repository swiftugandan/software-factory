name: CI

on:
  push:
  pull_request:

# T003 (AC-24): install -> apply migrations to a disposable test DB -> lint -> test ->
# coverage check -> secrets scan, in that fixed order (ADR-0007). scripts/ci.sh runs the same
# steps locally, so a CI failure here is reproducible with `./scripts/ci.sh`.
jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tinylink_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      # ADR-0004 uses a peer-auth Unix socket locally; GitHub Actions' postgres service is
      # TCP-only, so CI here uses a TCP DSN with the same disposable tinylink_test database.
      DATABASE_URL: postgresql://root:postgres@localhost:5432/tinylink_test
      SHORT_LINK_BASE_URL: http://localhost:3000
      SESSION_SECRET: ci-only-non-secret-session-value
      CODE_RETRY_MAX: '10'
      REDIRECT_P95_BUDGET_MS: '100'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations to tinylink_test
        run: npm run migrate -- up

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Coverage check (>= 70% lines/branches/functions, ADR-0007)
        run: npm run coverage

      - name: Secrets scan
        run: ./scripts/secrets-scan.sh
